baseURL = "https://yoloai.dev/"
languageCode = "en-us"
title = "yoloAI"
theme = "PaperMod"
paginate = 10

[params]
  description = "Sandboxed runner for AI coding agents. Review the diff. Apply what you want."
  author = "kstenerud"
  ShowReadingTime = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  defaultTheme = "dark"    # engineers expect dark mode

[params.homeInfoParams]
  Title = "yoloAI"
  Content = """
Run AI coding agents freely in a disposable sandbox.
Review exactly what changed. Apply what you want.

```bash
yoloai new fix-bug ~/projects/myapp
yoloai diff fix-bug
yoloai apply fix-bug
```

→ [Get started](https://github.com/kstenerud/yoloai) · [Why yoloAI](/posts/why-yoloai)
"""

